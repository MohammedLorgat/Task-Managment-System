<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <link rel="stylesheet" href="./css/signupPage.css" />
    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div
      class="container d-flex justify-content-center align-items-center min-vh-100 py-4"
    >
      <div class="signup-card p-4 w-100" style="max-width: 450px">
        <div class="text-center mb-4">
          <h2 class="fw-bold text-dark mb-2">Create an Account</h2>

          <p class="text-light-50">Join us and start managing your tasks</p>
        </div>

        <div id="alertContainer"></div>

        <form id="signupForm">
          <!-- Full Name -->
          <div class="form-floating mb-3">
            <input
              type="text"
              class="form-control"
              id="fullName"
              placeholder="John Doe"
              autocomplete="name"
              required
            />
            <label for="fullName"> Full Name </label>
          </div>

          <!-- Email -->
          <div class="form-floating mb-3">
            <input
              type="email"
              class="form-control"
              id="email"
              placeholder="name@example.com"
              autocomplete="email"
              required
            />
            <label for="email"> Email Address </label>
          </div>

          <!-- Gender -->
          <div class="form-floating mb-3">
            <select class="form-select" id="gender" required>
              <option value="" selected disabled>Select Gender</option>

              <option value="male">Male</option>

              <option value="female">Female</option>

              <option value="other">Other</option>
            </select>

            <label for="gender"> Gender </label>
          </div>

          <!-- Password -->
          <div class="form-floating mb-2">
            <input
              type="password"
              class="form-control"
              id="password"
              placeholder="Password"
              autocomplete="new-password"
              required
            />
            <label for="password"> Password </label>
          </div>

          <!-- <div class="password-hint mb-4">
            Minimum 8 characters with uppercase, lowercase, number and special
            character.
          </div> -->

          <button
            type="submit"
            class="btn btn-primary w-100 py-2"
            id="signupBtn"
          >
            <span class="btn-text"> Create Account </span>

            <span
              class="spinner-border spinner-border-sm d-none"
              role="status"
              aria-hidden="true"
              id="signupSpinner"
            ></span>
          </button>
        </form>

        <div class="text-center mt-4">
          <p class="text-light-50 mb-0">
            Already have an account?

            <a href="loginPage.html" class="fw-bold"> Log In </a>
          </p>
        </div>
      </div>
    </div>

    <script src="./js/signupPage.js"></script>
  </body>
</html>
