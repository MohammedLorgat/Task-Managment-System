<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Profile</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./css/dashboard.css" />
  </head>

  <body>
    <div class="dashboard-layout">
      <!-- Sidebar -->
      <aside class="sidebar">
        <h3 class="logo">Task Manager</h3>

        <ul class="menu">
          <li>
            <a href="dashboard.html" class="text-decoration-none"> Tasks </a>
          </li>

          <li class="active">
            <a href="profile.html" class="text-decoration-none"> Profile </a>
          </li>
        </ul>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <!-- Topbar -->
        <div class="topbar">
          <div>
            <h3 class="fw-bold mb-1" id="profileHeading">User Profile</h3>

            <p class="text-muted mb-0">View and manage your profile</p>
          </div>

          <button id="logoutBtn" class="btn btn-danger">Logout</button>
        </div>

        <!-- Profile Card -->
        <div class="table-card">
          <div class="text-center mb-4">
            <img
              id="profileImage"
              src="https://via.placeholder.com/150"
              alt="Profile Image"
              class="profile-avatar"
            />
          </div>

          <form id="profileForm">
            <div class="row">
              <!-- Full Name -->
              <div class="col-md-6 mb-3">
                <label class="form-label"> Full Name </label>

                <input type="text" id="fullName" class="form-control" />
              </div>

              <!-- Email -->
              <div class="col-md-6 mb-3">
                <label class="form-label"> Email Address </label>

                <input type="email" id="email" class="form-control" readonly />
              </div>

              <!-- Gender -->
              <div class="col-md-6 mb-3">
                <label class="form-label"> Gender </label>

                <select id="gender" class="form-select">
                  <option value="male">Male</option>

                  <option value="female">Female</option>

                  <option value="other">Other</option>
                </select>
              </div>

              <!-- Profile Photo -->
              <div class="col-md-6 mb-3">
                <label class="form-label"> Profile Photo </label>

                <input
                  type="file"
                  id="profileImageFile"
                  class="form-control"
                  accept="image/*"
                />
              </div>
            </div>

            <button type="submit" class="btn btn-primary px-4">
              Save Profile
            </button>
          </form>
        </div>
      </main>
    </div>

    <script src="./js/profile.js"></script>
  </body>
</html>
